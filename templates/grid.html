<h2>Ta grille {{ name }} ({{ code }})</h2>

<table border="1">
  {% for i in range(0, 16, 4) %}
  <tr>
    {% for j in range(4) %}
      <td style="padding:10px; width:200px; vertical-align:top;">

        <!-- ANECDOTE (VISIBLE) -->
        <div style="font-size:12px; margin-bottom:8px;">
          {{ grid[i + j] }}
        </div>

        <!-- INPUT POUR RÉPONSE -->
        <input type="text"
               placeholder="Nom..."
               style="width:100%; box-sizing:border-box;" />

      </td>
    {% endfor %}
  </tr>
  {% endfor %}
</table>

<script>
const inputs = document.querySelectorAll("input");

inputs.forEach((input, index) => {
  // recharge les valeurs sauvegardées
  const saved = localStorage.getItem("cell_" + index);
  if (saved) input.value = saved;

  // sauvegarde à chaque saisie
  input.addEventListener("input", () => {
    localStorage.setItem("cell_" + index, input.value);
  });
});
</script>
