<h2>Ta grille {{ name }} ({{ code }})</h2>

<table border="1">
  {% for i in range(4) %}
  <tr>
    {% for j in range(4) %}
    <td style="padding:10px;">
      <input type="text"
             style="width:120px; height:40px; font-size:16px;"
             placeholder="Nom..." />
    </td>
    {% endfor %}
  </tr>
  {% endfor %}
</table>

<script>
const inputs = document.querySelectorAll("input");

inputs.forEach((input, index) => {
  // recharge les valeurs sauvegardées
  const saved = localStorage.getItem("cell_" + index);
  if (saved) input.value = saved;

  // sauvegarde à chaque saisie
  input.addEventListener("input", () => {
    localStorage.setItem("cell_" + index, input.value);
  });
});
</script>
